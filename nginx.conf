# ==============================================================================
# 1. Redirecionamento de SEO (www -> non-www)
# ==============================================================================
# Captura o tráfego que vem do subdomínio www e redireciona (301 Permanente)
# para o domínio principal, centralizando o ranqueamento nos motores de busca.
server {
    listen 8080;
    server_name www.netcao.com.br;
    
    # Repassa a URI exata para que links profundos não quebrem
    return 301 $scheme://netcao.com.br$request_uri;
}

# ==============================================================================
# 2. Servidor Principal da Aplicação
# ==============================================================================
server {
    listen 8080;
    server_name netcao.com.br;
    
    # Oculta a versão exata do Nginx nas requisições (Hardening básico)
    server_tokens off;

    # Diretório raiz gerado pelo Vite/React
    root /usr/share/nginx/html;
    index index.html;

    # --------------------------------------------------------------------------
    # 3. Performance: Compressão Gzip
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    # Apenas compacta arquivos maiores que ~10KB para poupar CPU
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # --------------------------------------------------------------------------
    # 4. Segurança: Headers de Resposta (Hardening)
    # --------------------------------------------------------------------------
    # Previne Clickjacking
    add_header X-Frame-Options "SAMEORIGIN";
    # Força bloqueio em caso de XSS detectado pelo browser
    add_header X-XSS-Protection "1; mode=block";
    # Impede o browser de "adivinhar" o MIME Type corrompido
    add_header X-Content-Type-Options "nosniff";
    # Limita o rastreio de URLs completas quando o usuário clica em links externos
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # --------------------------------------------------------------------------
    # 5. Roteamento SPA (Single Page Application - Vue/React)
    # --------------------------------------------------------------------------
    location / {
        # Tenta achar o arquivo/pasta física; se não existir, delega para o index.html
        try_files $uri $uri/ /index.html;
    }

    # --------------------------------------------------------------------------
    # 6. Performance: Cache de Arquivos Estáticos (Imagens, CSS, JS)
    # --------------------------------------------------------------------------
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|otf|ttf|svg)$ {
        # Cache no navegador de até 6 meses
        expires 6M;
        # Desabilita o log de acesso desses arquivos para poupar I/O no disco
        access_log off;
        add_header Cache-Control "public";
    }

    # --------------------------------------------------------------------------
    # 7. Tratamento Genérico de Erros
    # --------------------------------------------------------------------------
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}